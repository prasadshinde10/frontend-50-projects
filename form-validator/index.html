<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Form Validator</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <main class="card">
    <h1>Form Validator</h1>
    <form id="form">
      <label>Name</label>
      <input type="text" id="name" placeholder="prasad shinde"/>
      <small id="name-error"></small>

      <label>Email</label>
      <input type="email" id="email" placeholder="panchhi@example.com"/>
      <small id="email-error"></small>

      <label>Password</label>
      <input type="password" id="password" placeholder="Min 6 chars"/>
      <small id="pass-error"></small>

      <button type="submit">Submit</button>
    </form>
  </main>
  <script src="script.js"></script>
</body>
</html>
