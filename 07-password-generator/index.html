<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Password Generator</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <main class="box">
    <h1>Password Generator</h1>
    <div class="output">
      <input id="result" readonly />
      <button id="copy">Copy</button>
    </div>

    <label>Length: <span id="len-val">12</span></label>
    <input type="range" id="length" min="6" max="20" value="12" />

    <div class="checks">
      <label><input type="checkbox" id="upper" checked /> Uppercase</label>
      <label><input type="checkbox" id="lower" checked /> Lowercase</label>
      <label><input type="checkbox" id="numbers" checked /> Numbers</label>
      <label><input type="checkbox" id="symbols" /> Symbols</label>
    </div>

    <button id="generate">Generate</button>
  </main>
  <script src="script.js"></script>
</body>
</html>
