<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Image Slider</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <main class="slider">
    <h1>Image Slider</h1>
    <div class="frame">
      <img id="image" src="https://picsum.photos/600/300?random=1" alt="slide"/>
    </div>
    <div class="controls">
      <button id="prev">Prev</button>
      <button id="next">Next</button>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
