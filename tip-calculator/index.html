<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tip Calculator</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <main class="card">
    <h1>Tip Calculator</h1>
    <label>Bill Amount ($)</label>
    <input type="number" id="bill" placeholder="50"/>
    <label>Tip %</label>
    <input type="range" id="tip" min="5" max="30" value="15"/>
    <p>Tip: <span id="tip-val">15</span>%</p>
    <label>People</label>
    <input type="number" id="people" value="1" min="1"/>
    <p id="total">Total per person: $0.00</p>
  </main>
  <script src="script.js"></script>
</body>
</html>
